name: Build Extension
on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: npm install
              run: npm ci

            - name: Build
              run: npm run build

            - name: Test
              run: npm run test

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: artifacts
                  path: |
                      vscode-extension/extension.vsix
